<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTORIA HOME - Canton Fair Product Capture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --accent: #ed8936;
            --accent-hover: #dd6b20;
            --bg: #f7fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #2d3748;
            --text-light: #718096;
            --success: #48bb78;
            --error: #f56565;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--text);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 2.5rem;
            position: relative;
        }
        .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .header p { font-size: 0.95rem; opacity: 0.9; font-family: 'JetBrains Mono', monospace; }
        
        /* Settings Icon in Header */
        .settings-icon {
            position: absolute;
            top: 2.5rem;
            right: 2.5rem;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            padding: 0.6rem;
            border-radius: 50%;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-icon:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }
        .settings-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* Currency Settings Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-header h3 {
            font-size: 1.2rem;
            color: var(--primary);
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-light);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .close-modal:hover {
            background: var(--bg);
        }
        .currency-inputs {
            display: grid;
            gap: 1.25rem;
        }
        .currency-inputs .form-group label {
            font-size: 0.85rem;
            color: var(--text);
            margin-bottom: 0.4rem;
            display: block;
            font-weight: 600;
        }
        .currency-inputs input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: monospace;
        }
        .currency-inputs input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(237,137,54,0.12);
        }

        /* Annotation Modal */
        .annotation-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            overflow: auto;
            padding: 20px;
        }
        .annotation-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .annotation-modal-content {
            background: white;
            border-radius: 16px;
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            overflow: auto;
            padding: 24px;
        }
        .annotation-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }
        .annotation-modal-header h2 {
            color: var(--primary);
            margin: 0;
            font-size: 1.3rem;
        }
        .annotation-modal-close {
            background: var(--error);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .annotation-modal-close:hover {
            background: #e53e3e;
            transform: rotate(90deg);
        }
        .toolbar {
            background: #2d3748;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .tool-btn {
            background: #4a5568;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tool-btn:hover {
            background: #5a67d8;
        }
        .tool-btn.active {
            background: #5a67d8;
            box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.3);
        }
        .color-picker {
            width: 50px;
            height: 40px;
            border: 2px solid #4a5568;
            border-radius: 8px;
            cursor: pointer;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-group label {
            color: white;
            font-size: 13px;
            margin: 0;
        }
        .slider {
            width: 120px;
        }
        .size-display {
            color: white;
            font-size: 13px;
            min-width: 40px;
        }
        .canvas-container {
            border: 2px solid #cbd5e0;
            border-radius: 12px;
            overflow: hidden;
            background: #f7fafc;
            max-width: 100%;
            margin: 0 auto;
        }
        #annotationCanvas {
            display: block;
            max-width: 100%;
            height: auto;
            cursor: crosshair;
            touch-action: none;
        }
        .annotation-modal-footer {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .form-content { padding: 2.5rem; }
        .section {
            margin-bottom: 2.5rem;
            padding: 2rem;
            background: var(--bg);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .section-number {
            background: var(--accent);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.25rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        .required { color: var(--error); }
        input, select, textarea {
            padding: 0.7rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            background: white;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(237,137,54,0.12);
        }
        textarea { resize: vertical; min-height: 90px; }

        /* File Upload Styling */
        .file-upload-group {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 1.25rem;
            border-radius: 10px;
        }
        .file-upload-group label {
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }
        .file-upload-group input[type="file"] {
            background: white;
            padding: 0.6rem;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-size: 0.85rem;
            border: none;
        }
        .file-name-display {
            color: white;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            opacity: 0.9;
        }

        .products-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-top: 2rem;
            border: 2px solid var(--border);
        }
        .product-card {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 2px solid var(--border);
        }
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 2px dashed var(--border);
        }
        .product-number { font-weight: 700; color: var(--primary); font-size: 1rem; }
        .remove-product {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .remove-product:hover { background: #e53e3e; }
        .image-upload-section {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 1.25rem;
            border-radius: 10px;
            margin-bottom: 1.25rem;
        }
        .image-upload-section label {
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }
        .image-upload-section input[type="file"] {
            background: white;
            padding: 0.6rem;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-size: 0.85rem;
            border: none;
        }
        .image-preview { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-top: 12px; 
        }
        .image-item { 
            position: relative; 
            border-radius: 8px; 
            overflow: hidden;
            border: 2px solid white;
        }
        .image-item img { 
            width: 100px; 
            height: 100px; 
            object-fit: cover; 
            display: block; 
        }
        .image-item-actions {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            gap: 2px;
        }
        .annotate-image-btn {
            flex: 1;
            background: #5a67d8;
            color: white;
            border: none;
            padding: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .annotate-image-btn:hover {
            background: #4c51bf;
        }
        .remove-image {
            background: rgba(220,53,69,0.9);
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }
        .remove-image:hover {
            background: rgba(220,53,69,1);
        }
        .annotated-badge {
            position: absolute;
            top: 4px;
            left: 4px;
            background: #48bb78;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .status-group { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            padding: 0.45rem 0.85rem;
            background: white;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .checkbox-label:hover { border-color: var(--accent); background: rgba(237,137,54,0.05); }
        .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; margin: 0; }
        .action-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-secondary:hover { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #38a169; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .message {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-weight: 500;
            display: none;
        }
        .message.success { background: #c6f6d5; color: #22543d; border-left: 4px solid var(--success); }
        .message.error { background: #fed7d7; color: #742a2a; border-left: 4px solid var(--error); }
        .message.show { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .spinner {
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .loading .spinner { display: inline-block; }
        .loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.4rem; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .settings-icon { top: 1.5rem; right: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏢 ASTORIA HOME · APRIL FAIR-2026</h1>
        <p>VENDOR INTRODUCTION · BUYER COPY · CONFIDENTIAL</p>
        
        <!-- Settings Icon -->
        <div class="settings-icon" onclick="openSettingsModal()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
        </div>
    </div>

    <!-- Currency Settings Modal -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettingsModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>⚙️ Pricing Calculation Settings</h3>
                <button class="close-modal" onclick="closeSettingsModal()">×</button>
            </div>
            <div class="currency-inputs">
                <div class="form-group">
                    <label>💵 USD to INR Exchange Rate</label>
                    <input type="number" id="exchangeRate" value="83" step="0.01" min="1" placeholder="83">
                </div>
                <div class="form-group">
                    <label>🚚 Logistics Factor (e.g., 1.5x)</label>
                    <input type="number" id="logisticsFactor" value="1.5" step="0.1" min="1" placeholder="1.5">
                </div>
                <div class="form-group">
                    <label>📈 Margin Multiplier (e.g., 2.8x)</label>
                    <input type="number" id="marginMultiplier" value="2.8" step="0.1" min="1" placeholder="2.8">
                </div>
                <div class="form-group">
                    <label>🧾 GST Rate (18% = 1.18)</label>
                    <input type="number" id="gstRate" value="1.18" step="0.01" min="1" placeholder="1.18">
                </div>
            </div>
        </div>
    </div>

    <!-- Annotation Modal -->
    <div class="annotation-modal" id="annotationModal">
        <div class="annotation-modal-content">
            <div class="annotation-modal-header">
                <h2>🎨 Image Annotation - iPad Pencil Support</h2>
                <button class="annotation-modal-close" id="closeAnnotationModal">×</button>
            </div>
            
            <div class="toolbar">
                <button class="tool-btn active" id="penBtn">✏️ Pen</button>
                <button class="tool-btn" id="eraserBtn">🧹 Eraser</button>
                
                <div style="width: 1px; height: 30px; background: #4a5568;"></div>
                
                <label style="color: white; font-size: 13px; margin: 0;">Color:</label>
                <input type="color" class="color-picker" id="colorPicker" value="#ff0000">
                
                <div class="slider-group">
                    <label>Size:</label>
                    <input type="range" class="slider" id="sizeSlider" min="1" max="20" value="3">
                    <span class="size-display" id="sizeDisplay">3px</span>
                </div>
            </div>
            
            <div class="canvas-container">
                <canvas id="annotationCanvas"></canvas>
            </div>
            
            <div class="annotation-modal-footer">
                <button class="btn" id="clearAnnotations" style="background: #fc8181; color: white;">
                    🗑️ Clear All
                </button>
                <button class="btn btn-success" id="saveAnnotation">
                    ✅ Save Annotated Image
                </button>
            </div>
        </div>
    </div>

    <div class="form-content">
        <div id="message" class="message"></div>

        <form id="cantonForm">

            <!-- Section 1: Company Details -->
            <div class="section">
                <div class="section-title"><span class="section-number">01</span> COMPANY DETAILS</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Company Name <span class="required">*</span></label>
                        <input type="text" name="companyName" required>
                    </div>
                    <div class="form-group">
                        <label>Booth No. <span class="required">*</span></label>
                        <input type="text" name="boothNo" required>
                    </div>
                    <div class="form-group">
                        <label>Zone / Hall</label>
                        <input type="text" name="zoneHall">
                    </div>
                    <div class="form-group">
                        <label>Date Visited</label>
                        <input type="date" name="dateVisited">
                    </div>
                    <div class="form-group">
                        <label>Country of Manufacture</label>
                        <input type="text" name="countryOfManufacture">
                    </div>
                    
                    <!-- Catalogue Upload -->
                    <div class="form-group file-upload-group">
                        <label>📄 Catalogue Upload</label>
                        <input type="file" id="catalogueFile" accept=".pdf,.doc,.docx,image/*" onchange="handleCatalogueUpload(this)">
                        <div class="file-name-display" id="catalogueName"></div>
                    </div>
                    
                    <!-- Visiting Card Upload -->
                    <div class="form-group file-upload-group">
                        <label>💳 Visiting Card Upload</label>
                        <input type="file" id="visitingCardFile" accept="image/*,.pdf" onchange="handleVisitingCardUpload(this)">
                        <div class="file-name-display" id="visitingCardName"></div>
                    </div>
                </div>
            </div>

            <!-- Section 2: Contact -->
            <div class="section">
                <div class="section-title"><span class="section-number">02</span> CONTACT INFORMATION</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Contact Person <span class="required">*</span></label>
                        <input type="text" name="contactPerson" required>
                    </div>
                    <div class="form-group">
                        <label>Designation</label>
                        <input type="text" name="designation">
                    </div>
                    <div class="form-group">
                        <label>WeChat ID</label>
                        <input type="text" name="wechatId">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp No.</label>
                        <input type="tel" name="whatsappNo">
                    </div>
                    <div class="form-group full-width">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" name="emailAddress" required>
                    </div>
                </div>
            </div>

            <!-- Section 3: Commercial Terms -->
            <div class="section">
                <div class="section-title"><span class="section-number">03</span> COMMERCIAL TERMS</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Min Order Qty (pcs)</label>
                        <input type="number" name="minOrderQty" min="0">
                    </div>
                    <div class="form-group">
                        <label>Min Order Value (USD)</label>
                        <input type="number" name="minOrderValue" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Sample Cost (USD)</label>
                        <input type="text" name="sampleCost" placeholder="e.g., 50 or Free or N/A">
                    </div>
                    <div class="form-group">
                        <label>Sample Lead Time</label>
                        <input type="text" name="sampleLeadTime" placeholder="e.g., 7-10 days">
                    </div>
                    <div class="form-group">
                        <label>Production Lead Time</label>
                        <input type="text" name="productionLeadTime" placeholder="e.g., 30-45 days">
                    </div>
                    <div class="form-group">
                        <label>Delivery Term</label>
                        <select name="deliveryTerm">
                            <option value="">Select...</option>
                            <option>FOB</option><option>EXW</option><option>CIF</option><option>DDP</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payment Terms</label>
                        <input type="text" name="paymentTerms" placeholder="e.g., 30% TT, 70% BL">
                    </div>
                    <div class="form-group">
                        <label>Currency Accepted</label>
                        <input type="text" name="currencyAccepted" placeholder="e.g., USD, EUR, CNY">
                    </div>
                </div>
            </div>

            <!-- Section 4: Product Range -->
            <div class="section">
                <div class="section-title"><span class="section-number">04</span> PRODUCT RANGE & CAPABILITIES</div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Main Product Categories</label>
                        <textarea name="mainProductCategories" placeholder="e.g., Home decor, Textiles, Furniture..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Materials / Finishes Available</label>
                        <textarea name="materialsFinishes" placeholder="e.g., Wood, Metal, Ceramic..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Customisation Available?</label>
                        <select name="customisation">
                            <option value="">Select...</option>
                            <option>Yes</option><option>No</option><option>Limited</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Certifications</label>
                        <input type="text" name="certifications" placeholder="e.g., CE, FSC, BSCI">
                    </div>
                    <div class="form-group">
                        <label>White Label / OEM Available?</label>
                        <select name="whiteLabelOEM">
                            <option value="">Select...</option>
                            <option>Yes</option><option>No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Packaging Options</label>
                        <input type="text" name="packagingOptions" placeholder="e.g., Custom box, Bulk pack">
                    </div>
                </div>
            </div>

            <!-- Products -->
            <div class="products-section">
                <div class="section-title" style="margin-bottom: 1rem;">
                    <span style="font-size: 1.2rem;">📦</span> PRODUCT CAPTURE
                </div>
                <div id="productsContainer"></div>
                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary" onclick="addProduct()">➕ Add Product</button>
                </div>
            </div>

            <!-- Submit -->
            <div class="action-buttons" style="margin-top: 2.5rem;">
                <button type="submit" class="btn btn-success" id="submitBtn">
                    <span class="btn-text">💾 Submit to Google Sheets</span>
                    <span class="spinner"></span>
                </button>
                <button type="reset" class="btn btn-secondary" onclick="resetForm()">🔄 Reset Form</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ── Settings Modal ─────────────────────────────────────────
    function openSettingsModal() {
        document.getElementById('settingsModal').classList.add('show');
    }

    function closeSettingsModal(event) {
        if (!event || event.target.id === 'settingsModal') {
            document.getElementById('settingsModal').classList.remove('show');
        }
    }

    // ── Annotation State ───────────────────────────────────────
    let currentAnnotatingProduct = null;
    let currentAnnotatingImageIndex = null;
    let isDrawing = false;
    let currentTool = 'pen';
    let currentColor = '#ff0000';
    let currentSize = 3;
    
    const annotationModal = document.getElementById('annotationModal');
    const canvas = document.getElementById('annotationCanvas');
    const ctx = canvas.getContext('2d');
    const penBtn = document.getElementById('penBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    const colorPicker = document.getElementById('colorPicker');
    const sizeSlider = document.getElementById('sizeSlider');
    const sizeDisplay = document.getElementById('sizeDisplay');
    const closeAnnotationModal = document.getElementById('closeAnnotationModal');
    const clearAnnotations = document.getElementById('clearAnnotations');
    const saveAnnotation = document.getElementById('saveAnnotation');

    // ── Annotation Tool Selection ─────────────────────────────
    penBtn.addEventListener('click', () => {
        currentTool = 'pen';
        penBtn.classList.add('active');
        eraserBtn.classList.remove('active');
        canvas.style.cursor = 'crosshair';
    });

    eraserBtn.addEventListener('click', () => {
        currentTool = 'eraser';
        eraserBtn.classList.add('active');
        penBtn.classList.remove('active');
        canvas.style.cursor = 'grab';
    });

    colorPicker.addEventListener('input', (e) => {
        currentColor = e.target.value;
    });

    sizeSlider.addEventListener('input', (e) => {
        currentSize = e.target.value;
        sizeDisplay.textContent = currentSize + 'px';
    });

    // ── Open Annotation Modal ─────────────────────────────────
    function openAnnotation(productId, imageIndex) {
        currentAnnotatingProduct = productId;
        currentAnnotatingImageIndex = imageIndex;
        
        const imgSrc = productImages[productId][imageIndex];
        const img = new Image();
        img.onload = () => {
            setupCanvas(img);
            annotationModal.classList.add('active');
        };
        img.src = imgSrc;
    }

    function setupCanvas(img) {
        const maxWidth = 1000;
        let width = img.width;
        let height = img.height;
        
        if (width > maxWidth) {
            height = (maxWidth / width) * height;
            width = maxWidth;
        }
        
        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(img, 0, 0, width, height);
    }

    // ── Close Annotation Modal ───────────────────────────────
    closeAnnotationModal.addEventListener('click', () => {
        annotationModal.classList.remove('active');
    });

    // ── Drawing Events ────────────────────────────────────────
    canvas.addEventListener('pointerdown', startDrawing);
    canvas.addEventListener('pointermove', draw);
    canvas.addEventListener('pointerup', stopDrawing);
    canvas.addEventListener('pointerout', stopDrawing);

    function startDrawing(e) {
        isDrawing = true;
        const pos = getPosition(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function draw(e) {
        if (!isDrawing) return;
        
        const pos = getPosition(e);
        
        if (currentTool === 'pen') {
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (e.pressure) {
                ctx.lineWidth = currentSize * e.pressure * 2;
            }
            
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        } else if (currentTool === 'eraser') {
            ctx.clearRect(pos.x - currentSize, pos.y - currentSize, currentSize * 2, currentSize * 2);
        }
        
        e.preventDefault();
    }

    function stopDrawing() {
        isDrawing = false;
        ctx.beginPath();
    }

    function getPosition(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        return {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
        };
    }

    // ── Clear Annotations ─────────────────────────────────────
    clearAnnotations.addEventListener('click', () => {
        if (confirm('Clear all annotations?')) {
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = productImages[currentAnnotatingProduct][currentAnnotatingImageIndex];
        }
    });

    // ── Save Annotation ───────────────────────────────────────
    saveAnnotation.addEventListener('click', () => {
        const annotatedData = canvas.toDataURL('image/png');
        productImages[currentAnnotatingProduct][currentAnnotatingImageIndex] = annotatedData;
        
        // Mark as annotated
        if (!productAnnotations[currentAnnotatingProduct]) {
            productAnnotations[currentAnnotatingProduct] = [];
        }
        productAnnotations[currentAnnotatingProduct][currentAnnotatingImageIndex] = true;
        
        renderPreviews(currentAnnotatingProduct);
        annotationModal.classList.remove('active');
        showMessage('✅ Image annotated successfully!', 'success');
    });

    // ── State ──────────────────────────────────────────────────
    let productCount = 0;
    let productImages = {};
    let productAnnotations = {};
    let catalogueFileData = null;
    let visitingCardFileData = null;

    // ── Catalogue File Upload ─────────────────────────────────
    function handleCatalogueUpload(input) {
        const file = input.files[0];
        if (!file) return;
        
        document.getElementById('catalogueName').textContent = '📄 ' + file.name;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            catalogueFileData = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // ── Visiting Card File Upload ─────────────────────────────
    function handleVisitingCardUpload(input) {
        const file = input.files[0];
        if (!file) return;
        
        document.getElementById('visitingCardName').textContent = '💳 ' + file.name;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            visitingCardFileData = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // ── USD to INR Auto-Conversion ────────────────────────────
    function calculateMRP(usdPrice, productId) {
        const exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 83;
        const logisticsFactor = parseFloat(document.getElementById('logisticsFactor').value) || 1.5;
        const marginMultiplier = parseFloat(document.getElementById('marginMultiplier').value) || 2.8;
        const gstRate = parseFloat(document.getElementById('gstRate').value) || 1.18;
        
        if (!usdPrice || usdPrice <= 0) return;
        
        const mrpInr = usdPrice * logisticsFactor * marginMultiplier * gstRate * exchangeRate;
        
        const mrpField = document.querySelector(`input[name="products[${productId}][mrpTarget]"]`);
        if (mrpField) {
            mrpField.value = mrpInr.toFixed(2);
        }
    }

    // ── Add Product ───────────────────────────────────────────
    function addProduct() {
        productCount++;
        const id = productCount;
        const card = document.createElement('div');
        card.className = 'product-card';
        card.id = `product-${id}`;
        card.innerHTML = `
            <div class="product-header">
                <span class="product-number">Product #${id}</span>
                <button type="button" class="remove-product" onclick="removeProduct(${id})">🗑️ Remove</button>
            </div>
            <div class="image-upload-section">
                <label>📸 Upload Product Images (multiple allowed)</label>
                <input type="file" id="images-${id}" accept="image/*" multiple onchange="handleImageUpload(${id}, this)">
                <div class="image-preview" id="preview-${id}"></div>
            </div>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Product Name / Description</label>
                    <input type="text" name="products[${id}][name]" placeholder="Enter product name or description">
                </div>
                <div class="form-group">
                    <label>Buy Price (USD)</label>
                    <input type="number" name="products[${id}][buyPrice]" step="0.01" min="0" placeholder="0.00" id="buyPrice-${id}">
                </div>
                <div class="form-group">
                    <label>MRP Target (INR) <span style="font-size: 0.75rem; color: #718096;">• Auto-calculated</span></label>
                    <input type="number" name="products[${id}][mrpTarget]" step="0.01" min="0" placeholder="0.00" id="mrpTarget-${id}">
                </div>
                <div class="form-group">
                    <label>MOQ (pcs)</label>
                    <input type="number" name="products[${id}][moq]" min="0" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Lead Time</label>
                    <input type="text" name="products[${id}][leadTime]" placeholder="e.g., 30 days">
                </div>
                <div class="form-group">
                    <label>Material / Finish</label>
                    <input type="text" name="products[${id}][material]" placeholder="e.g., Ceramic, Matte">
                </div>
                <div class="form-group">
                    <label>Size / Dimensions</label>
                    <input type="text" name="products[${id}][size]" placeholder="e.g., 30x20x15 cm">
                </div>
                <div class="form-group">
                    <label>Colour Options</label>
                    <input type="text" name="products[${id}][colours]" placeholder="e.g., White, Black">
                </div>
                <div class="form-group">
                    <label>Customisation?</label>
                    <select name="products[${id}][customisation]">
                        <option value="">Select...</option>
                        <option>Yes</option><option>No</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Status</label>
                    <div class="status-group">
                        <label class="checkbox-label"><input type="checkbox" name="products[${id}][sampleTaken]" value="Yes"> Sample Taken</label>
                        <label class="checkbox-label"><input type="checkbox" name="products[${id}][shortlist]" value="Yes"> ⭐ Shortlist</label>
                        <label class="checkbox-label"><input type="checkbox" name="products[${id}][onHold]" value="Yes"> On Hold</label>
                        <label class="checkbox-label"><input type="checkbox" name="products[${id}][rejected]" value="Yes"> Rejected</label>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Notes / Price Negotiation / Observations</label>
                    <textarea name="products[${id}][notes]" rows="3" placeholder="Notes, negotiation details, observations..."></textarea>
                </div>
            </div>
        `;
        document.getElementById('productsContainer').appendChild(card);

        const buyPriceInput = document.getElementById(`buyPrice-${id}`);
        if (buyPriceInput) {
            buyPriceInput.addEventListener('input', function() {
                const usdValue = parseFloat(this.value);
                calculateMRP(usdValue, id);
            });
        }
    }

    function removeProduct(id) {
        const el = document.getElementById(`product-${id}`);
        if (el) el.remove();
        delete productImages[id];
        delete productAnnotations[id];
    }

    // ── Image Handling ────────────────────────────────────────
    function handleImageUpload(productId, input) {
        if (!productImages[productId]) productImages[productId] = [];
        const files = input.files;
        for (let i = 0; i < files.length; i++) {
            const reader = new FileReader();
            reader.onload = function (e) {
                productImages[productId].push(e.target.result);
                renderPreviews(productId);
            };
            reader.readAsDataURL(files[i]);
        }
        input.value = '';
    }

    function renderPreviews(productId) {
        const preview = document.getElementById(`preview-${productId}`);
        preview.innerHTML = '';
        (productImages[productId] || []).forEach((src, i) => {
            const isAnnotated = productAnnotations[productId] && productAnnotations[productId][i];
            const item = document.createElement('div');
            item.className = 'image-item';
            item.innerHTML = `
                ${isAnnotated ? '<div class="annotated-badge">✅ Annotated</div>' : ''}
                <img src="${src}" alt="Product image ${i+1}">
                <div class="image-item-actions">
                    <button type="button" class="annotate-image-btn" onclick="openAnnotation(${productId}, ${i})">
                        ✏️ ${isAnnotated ? 'Edit' : 'Annotate'}
                    </button>
                    <button type="button" class="remove-image" onclick="removeImage(${productId}, ${i})">×</button>
                </div>
            `;
            preview.appendChild(item);
        });
    }

    function removeImage(productId, idx) {
        productImages[productId].splice(idx, 1);
        if (productAnnotations[productId]) {
            productAnnotations[productId].splice(idx, 1);
        }
        renderPreviews(productId);
    }

    // ── Reset ─────────────────────────────────────────────────
    function resetForm() {
        productImages = {};
        productAnnotations = {};
        productCount = 0;
        catalogueFileData = null;
        visitingCardFileData = null;
        document.getElementById('catalogueName').textContent = '';
        document.getElementById('visitingCardName').textContent = '';
        document.getElementById('productsContainer').innerHTML = '';
        addProduct();
    }

    // ── Form Submit ───────────────────────────────────────────
    document.getElementById('cantonForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const scriptUrl = 'https://script.google.com/macros/s/AKfycby_-UGO1P0KQlZOEVS9pEfI0LhbwBXYZMpraXq8kTke57UQE_dzPLsM6LeVB8EVcnZnog/exec';

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');

        try {
            const formData = new FormData(this);
            const data = { vendor: {}, products: [], timestamp: new Date().toISOString() };

            for (let [key, val] of formData.entries()) {
                if (!key.startsWith('products[')) data.vendor[key] = val;
            }

            if (catalogueFileData) {
                data.vendor.catalogueFile = catalogueFileData;
            }
            if (visitingCardFileData) {
                data.vendor.visitingCardFile = visitingCardFileData;
            }

            const productsMap = {};
            for (let [key, val] of formData.entries()) {
                const m = key.match(/^products\[(\d+)\]\[(\w+)\]$/);
                if (m) {
                    const [, pid, field] = m;
                    if (!productsMap[pid]) productsMap[pid] = {};
                    productsMap[pid][field] = val;
                }
            }

            Object.keys(productsMap).forEach(pid => {
                if (productImages[pid] && productImages[pid].length > 0) {
                    productsMap[pid].images = productImages[pid];
                    productsMap[pid].imageCount = productImages[pid].length;
                }
            });

            data.products = Object.values(productsMap).filter(p => p.name && p.name.trim());

            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            showMessage('✅ Data has been successfully submitted to Google Sheets! Please check the sheet.', 'success');
            setTimeout(() => {
                this.reset();
                resetForm();
            }, 2500);

        } catch (err) {
            console.error(err);
            showMessage('❌ Error: ' + err.message + ' — Please verify the Script URL.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
        }
    });

    function showMessage(text, type) {
        const div = document.getElementById('message');
        div.textContent = text;
        div.className = `message ${type} show`;
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        setTimeout(() => div.classList.remove('show'), 6000);
    }

    addProduct();
</script>
</body>
</html>
