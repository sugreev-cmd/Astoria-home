<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTORIA HOME - Canton Fair Product Capture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --accent: #ed8936;
            --accent-hover: #dd6b20;
            --bg: #f7fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #2d3748;
            --text-light: #718096;
            --success: #48bb78;
            --error: #f56565;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--text);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 2.5rem;
        }
        .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .header p { font-size: 0.95rem; opacity: 0.9; font-family: 'JetBrains Mono', monospace; }
        .form-content { padding: 2.5rem; }
        .section {
            margin-bottom: 2.5rem;
            padding: 2rem;
            background: var(--bg);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .section-number {
            background: var(--accent);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.25rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        .required { color: var(--error); }
        input, select, textarea {
            padding: 0.7rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            background: white;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(237,137,54,0.12);
        }
        textarea { resize: vertical; min-height: 90px; }
        .rating-stars { display: flex; gap: 0.5rem; padding: 0.4rem 0; }
        .star { font-size: 1.75rem; cursor: pointer; color: #cbd5e0; transition: all 0.15s; }
        .star.active, .star:hover { color: #f6ad55; transform: scale(1.1); }
        .products-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-top: 2rem;
            border: 2px solid var(--border);
        }
        .product-card {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 2px solid var(--border);
        }
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 2px dashed var(--border);
        }
        .product-number { font-weight: 700; color: var(--primary); font-size: 1rem; }
        .remove-product {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .remove-product:hover { background: #e53e3e; }
        .image-upload-section {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 1.25rem;
            border-radius: 10px;
            margin-bottom: 1.25rem;
        }
        .image-upload-section label {
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }
        .image-upload-section input[type="file"] {
            background: white;
            padding: 0.6rem;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-size: 0.85rem;
            border: none;
        }
        .image-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .image-item { position: relative; border-radius: 8px; overflow: hidden; }
        .image-item img { width: 100px; height: 100px; object-fit: cover; display: block; }
        .remove-image {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(220,53,69,0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status-group { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            padding: 0.45rem 0.85rem;
            background: white;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .checkbox-label:hover { border-color: var(--accent); background: rgba(237,137,54,0.05); }
        .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; margin: 0; }
        .action-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-secondary:hover { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #38a169; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .message {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-weight: 500;
            display: none;
        }
        .message.success { background: #c6f6d5; color: #22543d; border-left: 4px solid var(--success); }
        .message.error { background: #fed7d7; color: #742a2a; border-left: 4px solid var(--error); }
        .message.show { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .spinner {
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .loading .spinner { display: inline-block; }
        .loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Currency Settings Banner ── */
        .currency-banner {
            background: #dbeafe;
            border: 2px solid #3b82f6;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #1e40af;
        }
        .currency-banner strong { display: block; margin-bottom: 0.5rem; font-size: 1rem; }
        .currency-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.75rem;
        }
        .currency-inputs input {
            border-color: #3b82f6;
            font-family: monospace;
        }
        .currency-inputs label {
            font-size: 0.8rem;
            color: #1e40af;
            margin-bottom: 0.25rem;
            display: block;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.4rem; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .currency-inputs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏢 ASTORIA HOME · CANTON FAIR</h1>
        <p>VENDOR INTRODUCTION · BUYER COPY · CONFIDENTIAL</p>
    </div>

    <div class="form-content">
        <div id="message" class="message"></div>

        <!-- Currency Conversion Settings -->
        <div class="currency-banner">
            <strong>💱 Currency Conversion Settings (USD → INR MRP)</strong>
            <div class="currency-inputs">
                <div>
                    <label>USD to INR Rate (Exchange Rate)</label>
                    <input type="number" id="usdToInrRate" value="83" step="0.01" min="1" placeholder="83">
                </div>
                <div>
                    <label>MRP Markup Multiplier (e.g., 2.5x)</label>
                    <input type="number" id="mrpMultiplier" value="2.5" step="0.1" min="1" placeholder="2.5">
                </div>
            </div>
        </div>

        <form id="cantonForm">

            <!-- Section 1: Company Details -->
            <div class="section">
                <div class="section-title"><span class="section-number">01</span> COMPANY DETAILS</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Company Name <span class="required">*</span></label>
                        <input type="text" name="companyName" required>
                    </div>
                    <div class="form-group">
                        <label>Booth No. <span class="required">*</span></label>
                        <input type="text" name="boothNo" required>
                    </div>
                    <div class="form-group">
                        <label>Zone / Hall</label>
                        <input type="text" name="zoneHall">
                    </div>
                    <div class="form-group">
                        <label>Date Visited</label>
                        <input type="date" name="dateVisited">
                    </div>
                    <div class="form-group">
                        <label>Country of Manufacture</label>
                        <input type="text" name="countryOfManufacture">
                    </div>
                    <div class="form-group full-width">
                        <label>Website / Catalogue URL</label>
                        <input type="url" name="websiteUrl" placeholder="https://">
                    </div>
                </div>
            </div>

            <!-- Section 2: Contact -->
            <div class="section">
                <div class="section-title"><span class="section-number">02</span> CONTACT INFORMATION</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Contact Person <span class="required">*</span></label>
                        <input type="text" name="contactPerson" required>
                    </div>
                    <div class="form-group">
                        <label>Designation</label>
                        <input type="text" name="designation">
                    </div>
                    <div class="form-group">
                        <label>WeChat ID</label>
                        <input type="text" name="wechatId">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp No.</label>
                        <input type="tel" name="whatsappNo">
                    </div>
                    <div class="form-group full-width">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" name="emailAddress" required>
                    </div>
                </div>
            </div>

            <!-- Section 3: Commercial Terms -->
            <div class="section">
                <div class="section-title"><span class="section-number">03</span> COMMERCIAL TERMS</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Min Order Qty (pcs)</label>
                        <input type="number" name="minOrderQty" min="0">
                    </div>
                    <div class="form-group">
                        <label>Min Order Value (USD)</label>
                        <input type="number" name="minOrderValue" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Sample Cost (USD)</label>
                        <input type="number" name="sampleCost" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Sample Lead Time</label>
                        <input type="text" name="sampleLeadTime" placeholder="e.g., 7-10 days">
                    </div>
                    <div class="form-group">
                        <label>Production Lead Time</label>
                        <input type="text" name="productionLeadTime" placeholder="e.g., 30-45 days">
                    </div>
                    <div class="form-group">
                        <label>Delivery Term</label>
                        <select name="deliveryTerm">
                            <option value="">Select...</option>
                            <option>FOB</option><option>EXW</option><option>CIF</option><option>DDP</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payment Terms</label>
                        <input type="text" name="paymentTerms" placeholder="e.g., 30% TT, 70% BL">
                    </div>
                    <div class="form-group">
                        <label>Currency Accepted</label>
                        <input type="text" name="currencyAccepted" placeholder="e.g., USD, EUR, CNY">
                    </div>
                </div>
            </div>

            <!-- Section 4: Product Range -->
            <div class="section">
                <div class="section-title"><span class="section-number">04</span> PRODUCT RANGE & CAPABILITIES</div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Main Product Categories</label>
                        <textarea name="mainProductCategories" placeholder="e.g., Home decor, Textiles, Furniture..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Materials / Finishes Available</label>
                        <textarea name="materialsFinishes" placeholder="e.g., Wood, Metal, Ceramic..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Customisation Available?</label>
                        <select name="customisation">
                            <option value="">Select...</option>
                            <option>Yes</option><option>No</option><option>Limited</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Certifications</label>
                        <input type="text" name="certifications" placeholder="e.g., CE, FSC, BSCI">
                    </div>
                    <div class="form-group">
                        <label>White Label / OEM Available?</label>
                        <select name="whiteLabelOEM">
                            <option value="">Select...</option>
                            <option>Yes</option><option>No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Packaging Options</label>
                        <input type="text" name="packagingOptions" placeholder="e.g., Custom box, Bulk pack">
                    </div>
                </div>
            </div>

            <!-- Section 5: First Impression -->
            <div class="section">
                <div class="section-title"><span class="section-number">05</span> FIRST IMPRESSION</div>
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label>Overall Rating <span class="required">*</span></label>
                    <div class="rating-stars" id="ratingStars">
                        <span class="star" data-rating="1">★</span>
                        <span class="star" data-rating="2">★</span>
                        <span class="star" data-rating="3">★</span>
                        <span class="star" data-rating="4">★</span>
                        <span class="star" data-rating="5">★</span>
                    </div>
                    <input type="hidden" name="overallRating" id="overallRating">
                </div>
                <div class="form-group full-width">
                    <label>Overall Impression / Negotiation Notes / Follow-up Actions</label>
                    <textarea name="impressionNotes" rows="4" placeholder="Enter your observations, negotiation notes, and follow-up actions..."></textarea>
                </div>
            </div>

            <!-- Products -->
            <div class="products-section">
                <div class="section-title" style="margin-bottom: 1rem;">
                    <span style="font-size: 1.2rem;">📦</span> PRODUCT CAPTURE
                </div>
                <div id="productsContainer"></div>
                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary" onclick="addProduct()">➕ Add Product</button>
                </div>
            </div>

            <!-- Submit -->
            <div class="action-buttons" style="margin-top: 2.5rem;">
                <button type="submit" class="btn btn-success" id="submitBtn">
                    <span class="btn-text">💾 Submit to Google Sheets</span>
                    <span class="spinner"></span>
                </button>
                <button type="reset" class="btn btn-secondary" onclick="resetForm()">🔄 Reset Form</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ── State ──────────────────────────────────────────────────
    let productCount = 0;
    let selectedRating = 0;
    let productImages = {};

    // ── Rating Stars ──────────────────────────────────────────
    const stars = document.querySelectorAll('.star');
    stars.forEach(star => {
        star.addEventListener('click', function () {
            selectedRating = parseInt(this.getAttribute('data-rating'));
            document.getElementById('overallRating').value = selectedRating;
            updateStars();
        });
        star.addEventListener('mouseenter', function () {
            const r = parseInt(this.getAttribute('data-rating'));
            stars.forEach((s, i) => s.classList.toggle('active', i < r));
        });
    });
    document.getElementById('ratingStars').addEventListener('mouseleave', updateStars);
    function updateStars() {
        stars.forEach((s, i) => s.classList.toggle('active', i < selectedRating));
    }

    // ── USD to INR Auto-Conversion ────────────────────────────
    function calculateMRP(usdPrice, productId) {
        const exchangeRate = parseFloat(document.getElementById('usdToInrRate').value) || 83;
        const multiplier = parseFloat(document.getElementById('mrpMultiplier').value) || 2.5;
        
        if (!usdPrice || usdPrice <= 0) return;
        
        // Convert USD to INR and apply markup
        const mrpInr = usdPrice * exchangeRate * multiplier;
        
        // Update the MRP field
        const mrpField = document.querySelector(`input[name="products[${productId}][mrpTarget]"]`);
        if (mrpField) {
            mrpField.value = mrpInr.toFixed(2);
        }
    }

    // ── Add Product ───────────────────────────────────────────
    function addProduct() {
        productCount++;
        const id = productCount;
        const card = document.createElement('div');
        card.className = 'product-card';
        card.id = `product-${id}`;
        card.innerHTML = `
            <div class="product-header">
                <span class="product-number">Product #${id}</span>
                <button type="button" class="remove-product" onclick="removeProduct(${id})">🗑️ Remove</button>
            </div>
            <div class="image-upload-section">
                <label>📸 Product Images Upload karo (multiple allowed)</label>
                <input type="file" id="images-${id}" accept="image/*" multiple onchange="handleImageUpload(${id}, this)">
                <div class="image-preview" id="preview-${id}"></div>
            </div>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Product Name / Description</label>
                    <input type="text" name="products[${id}][name]" placeholder="Product ka naam ya description">
                </div>
                <div class="form-group">
                    <label>Buy Price (USD)</label>
                    <input type="number" name="products[${id}][buyPrice]" step="0.01" min="0" placeholder="0.00" id="buyPrice-${id}">
                </div>
                <div class="form-group">
                    <label>MRP Target (INR) <span style="font-size: 0.75rem; color: #718096;">• Auto-calculated</span></label>
                    <input type="number" name="products[${id}][mrpTarget]" step="0.01" min="0" placeholder="0.00" id="mrpTarget-${id}">
                </div>
                <div class="form-group">
                    <label>MOQ (pcs)</label>
                    <input type="number" name="products[${id}][moq]" min="0" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Lead Time</label>
                    <input type="text" name="products[${id}][leadTime]" placeholder="e.g., 30 days">
                </div>
                <div class="form-group">
                    <label>Material / Finish</label>
                    <input type="text" name="products[${id}][material]" placeholder="e.g., Ceramic, Matte">
                </div>
                <div class="form-group">
                    <label>Size / Dimensions</label>
                    <input type="text" name="products[${id}][size]" placeholder="e.g., 30x20x15 cm">
                </div>
                <div class="form-group">
                    <label>Colour Options</label>
                    <input type="text" name="products[${id}][colours]" placeholder="e.g., White, Black">
                </div>
                <div class="form-group">
                    <label>Customisation?</label>
                    <select name="products[${id}][customisation]">
                        <option value="">Select...</option>
                        <option>Yes</option><option>No</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Status</label>
                    <div class="status-group">
                        <label class="checkbox-label"><input type="checkbox" name="products[${id}][sampleTaken]" value="Yes"> Sample Taken</label>
                        <label class="checkbox-label"><input type="checkbox" name="products[${id}][shortlist]" value="Yes"> ⭐ Shortlist</label>
                        <label class="checkbox-label"><input type="checkbox" name="products[${id}][onHold]" value="Yes"> On Hold</label>
                        <label class="checkbox-label"><input type="checkbox" name="products[${id}][rejected]" value="Yes"> Rejected</label>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Notes / Price Negotiation / Observations</label>
                    <textarea name="products[${id}][notes]" rows="3" placeholder="Notes, negotiation details, observations..."></textarea>
                </div>
            </div>
        `;
        document.getElementById('productsContainer').appendChild(card);

        // Add event listener for automatic USD to INR conversion
        const buyPriceInput = document.getElementById(`buyPrice-${id}`);
        if (buyPriceInput) {
            buyPriceInput.addEventListener('input', function() {
                const usdValue = parseFloat(this.value);
                calculateMRP(usdValue, id);
            });
        }
    }

    function removeProduct(id) {
        const el = document.getElementById(`product-${id}`);
        if (el) el.remove();
        delete productImages[id];
    }

    // ── Image Handling ────────────────────────────────────────
    function handleImageUpload(productId, input) {
        if (!productImages[productId]) productImages[productId] = [];
        const files = input.files;
        for (let i = 0; i < files.length; i++) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const idx = productImages[productId].length;
                productImages[productId].push(e.target.result);
                renderPreviews(productId);
            };
            reader.readAsDataURL(files[i]);
        }
        input.value = '';
    }

    function renderPreviews(productId) {
        const preview = document.getElementById(`preview-${productId}`);
        preview.innerHTML = '';
        (productImages[productId] || []).forEach((src, i) => {
            const item = document.createElement('div');
            item.className = 'image-item';
            item.innerHTML = `
                <img src="${src}" alt="Product image ${i+1}">
                <button type="button" class="remove-image" onclick="removeImage(${productId}, ${i})">×</button>
            `;
            preview.appendChild(item);
        });
    }

    function removeImage(productId, idx) {
        productImages[productId].splice(idx, 1);
        renderPreviews(productId);
    }

    // ── Reset ─────────────────────────────────────────────────
    function resetForm() {
        selectedRating = 0;
        updateStars();
        productImages = {};
        productCount = 0;
        document.getElementById('productsContainer').innerHTML = '';
        addProduct();
    }

    // ── Form Submit ───────────────────────────────────────────
    document.getElementById('cantonForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        // Hardcoded Google Apps Script URL
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxv6D6dW_8KAMu4s5TudQzsmy5ytyq_HzR5f-7L6CvA6BxAVFD7U0KSTRgj9iD5LpYl3w/exec';
        
        if (!selectedRating) {
            showMessage('❌ Overall Rating select karo (stars mein se ek click karo)', 'error');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');

        try {
            const formData = new FormData(this);
            const data = { vendor: {}, products: [], timestamp: new Date().toISOString() };

            // Vendor fields
            for (let [key, val] of formData.entries()) {
                if (!key.startsWith('products[')) data.vendor[key] = val;
            }

            // Product fields
            const productsMap = {};
            for (let [key, val] of formData.entries()) {
                const m = key.match(/^products\[(\d+)\]\[(\w+)\]$/);
                if (m) {
                    const [, pid, field] = m;
                    if (!productsMap[pid]) productsMap[pid] = {};
                    productsMap[pid][field] = val;
                }
            }

            // Attach images
            Object.keys(productsMap).forEach(pid => {
                if (productImages[pid] && productImages[pid].length > 0) {
                    productsMap[pid].images = productImages[pid];
                    productsMap[pid].imageCount = productImages[pid].length;
                }
            });

            // Only include products that have a name
            data.products = Object.values(productsMap).filter(p => p.name && p.name.trim());

            // ── Send via no-cors (GAS doesn't need CORS headers) ──
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // no-cors response is opaque — if no error thrown, assume success
            showMessage('✅ Data successfully submit ho gaya Google Sheets mein! Sheet check karo.', 'success');
            setTimeout(() => {
                this.reset();
                resetForm();
            }, 2500);

        } catch (err) {
            console.error(err);
            showMessage('❌ Error: ' + err.message + ' — Script URL dobara check karo.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
        }
    });

    function showMessage(text, type) {
        const div = document.getElementById('message');
        div.textContent = text;
        div.className = `message ${type} show`;
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        setTimeout(() => div.classList.remove('show'), 6000);
    }

    // Add first product by default
    addProduct();
</script>
</body>
